<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1350" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a2744"/><stop offset="100%" stop-color="#2c4a7c"/></linearGradient>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fef7e0"/><stop offset="100%" stop-color="#fdefc3"/></linearGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fff3e0"/><stop offset="100%" stop-color="#ffe0b2"/></linearGradient>
    <filter id="s"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <filter id="sl"><feDropShadow dx="0.5" dy="1" stdDeviation="1.5" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1200" height="1350" fill="#f5f7fa" rx="12"/>
  <rect x="40" y="30" width="1120" height="80" rx="10" fill="url(#hg)" filter="url(#s)"/>
  <text x="600" y="65" text-anchor="middle" fill="white" font-size="22" font-weight="700">Expense Accounts — Plant Operations</text>
  <text x="600" y="90" text-anchor="middle" fill="#a8c4e8" font-size="13">47 CFR Part 32 · Subpart E · Plant Specific (6100s–6400s) &amp; Plant Nonspecific (6500s)</text>

  <!-- ======= PLANT SPECIFIC ======= -->
  <rect x="40" y="135" width="1120" height="40" rx="10" fill="#e37400"/>
  <rect x="40" y="163" width="1120" height="12" fill="#e37400"/>
  <text x="60" y="163" fill="white" font-size="17" font-weight="700">PLANT SPECIFIC OPERATIONS EXPENSE</text>
  <text x="980" y="163" fill="#ffe0b2" font-size="12" font-style="italic">Accts 6110–6410</text>

  <!-- Network Support 6110 -->
  <rect x="40" y="185" width="365" height="250" rx="10" fill="url(#bg1)" filter="url(#s)"/>
  <rect x="55" y="195" width="335" height="30" rx="6" fill="#f09d00"/>
  <text x="70" y="215" fill="white" font-size="13" font-weight="700">6110 Network Support Expenses</text>

  <rect x="55" y="232" width="335" height="50" rx="5" fill="white" filter="url(#sl)"/>
  <text x="65" y="250" fill="#e65100" font-size="11" font-weight="700">6112 Motor Vehicle Expense</text>
  <text x="65" y="268" fill="#333" font-size="10">Fuel, licenses, washing, garage equip. for motor vehicles</text>
  <text x="65" y="278" fill="#666" font-size="9" font-style="italic">Not driver cost (→ activity acct); credits for transfers to constr.</text>

  <rect x="55" y="288" width="335" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="65" y="306" fill="#e65100" font-size="11" font-weight="700">6113 Aircraft Expense</text>
  <text x="65" y="320" fill="#333" font-size="10">Maintenance, fuel, hangar costs for aircraft (not pilot costs)</text>

  <rect x="55" y="334" width="335" height="55" rx="5" fill="white" filter="url(#sl)"/>
  <text x="65" y="352" fill="#e65100" font-size="11" font-weight="700">6114 Tools &amp; Other Work Equipment Exp.</text>
  <text x="65" y="370" fill="#333" font-size="10">Special purpose vehicles, garage work equip., fuel, licenses</text>
  <text x="65" y="384" fill="#666" font-size="9" font-style="italic">Operator costs → activity accounts; credits on transfer to construction</text>

  <text x="55" y="420" fill="#7a5400" font-size="9" font-style="italic">Costs of the support equipment itself — not the people operating it</text>

  <!-- General Support 6120 -->
  <rect x="415" y="185" width="365" height="250" rx="10" fill="url(#bg1)" filter="url(#s)"/>
  <rect x="430" y="195" width="335" height="30" rx="6" fill="#f09d00"/>
  <text x="445" y="215" fill="white" font-size="13" font-weight="700">6120 General Support Expenses</text>

  <rect x="430" y="232" width="335" height="50" rx="5" fill="white" filter="url(#sl)"/>
  <text x="440" y="250" fill="#e65100" font-size="11" font-weight="700">6121 Land &amp; Building Expense</text>
  <text x="440" y="268" fill="#333" font-size="10">Janitorial, cleaning, water, sewage, fuel, guard, electric</text>
  <text x="440" y="278" fill="#666" font-size="9" font-style="italic">Network electric → 6531; computer electric → 6124</text>

  <rect x="430" y="288" width="160" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="440" y="306" fill="#e65100" font-size="11" font-weight="700">6122 Furniture</text>
  <text x="440" y="320" fill="#333" font-size="10">&amp; Artworks exp.</text>

  <rect x="600" y="288" width="165" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="610" y="306" fill="#e65100" font-size="11" font-weight="700">6123 Office Equip.</text>
  <text x="610" y="320" fill="#333" font-size="10">Equip. cost only</text>

  <rect x="430" y="334" width="335" height="55" rx="5" fill="white" filter="url(#sl)"/>
  <text x="440" y="352" fill="#e65100" font-size="11" font-weight="700">6124 General Purpose Computers Exp.</text>
  <text x="440" y="370" fill="#333" font-size="10">Computer operators, OS maintenance, metered electricity</text>
  <text x="440" y="384" fill="#666" font-size="9" font-style="italic">Excl. input prep, output use, app dev (→ 6720 G&amp;A)</text>

  <!-- Central Office 6210/6220/6230 -->
  <rect x="790" y="185" width="370" height="250" rx="10" fill="url(#bg1)" filter="url(#s)"/>
  <rect x="805" y="195" width="340" height="30" rx="6" fill="#f09d00"/>
  <text x="820" y="215" fill="white" font-size="13" font-weight="700">CENTRAL OFFICE EXPENSES</text>

  <rect x="805" y="232" width="340" height="55" rx="5" fill="white" filter="url(#sl)"/>
  <text x="815" y="250" fill="#e65100" font-size="12" font-weight="700">6210 Switching</text>
  <text x="825" y="268" fill="#333" font-size="10">6211  Non-Digital Switching Expense</text>
  <text x="825" y="282" fill="#333" font-size="10">6212  Digital Electronic Switching Expense</text>

  <rect x="805" y="293" width="340" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="815" y="311" fill="#e65100" font-size="12" font-weight="700">6220 Operator Systems Expense</text>
  <text x="815" y="325" fill="#333" font-size="10">Operator consoles, switching for operator calls</text>

  <rect x="805" y="339" width="340" height="55" rx="5" fill="white" filter="url(#sl)"/>
  <text x="815" y="357" fill="#e65100" font-size="12" font-weight="700">6230 Transmission</text>
  <text x="825" y="375" fill="#333" font-size="10">6231  Radio Systems Expense</text>
  <text x="825" y="389" fill="#333" font-size="10">6232  Circuit Equipment Expense</text>

  <text x="815" y="420" fill="#7a5400" font-size="9" font-style="italic">When equip. operators do identifiable functions → charge to those accts</text>

  <!-- Info Orig/Term 6310 -->
  <rect x="40" y="450" width="555" height="210" rx="10" fill="url(#bg1)" filter="url(#s)"/>
  <rect x="55" y="460" width="525" height="30" rx="6" fill="#d68400"/>
  <text x="70" y="480" fill="white" font-size="13" font-weight="700">6310 Information Origination/Termination Expenses</text>

  <rect x="55" y="498" width="255" height="45" rx="5" fill="white" filter="url(#sl)"/>
  <text x="65" y="516" fill="#e65100" font-size="11" font-weight="700">6311 Station Apparatus Exp.</text>
  <text x="65" y="534" fill="#333" font-size="10">Phone sets, data sets, key systems at CPE</text>

  <rect x="320" y="498" width="260" height="45" rx="5" fill="white" filter="url(#sl)"/>
  <text x="330" y="516" fill="#e65100" font-size="11" font-weight="700">6341 Large PBX Expense</text>
  <text x="330" y="534" fill="#333" font-size="10">Large private branch exchange systems</text>

  <rect x="55" y="549" width="255" height="45" rx="5" fill="white" filter="url(#sl)"/>
  <text x="65" y="567" fill="#e65100" font-size="11" font-weight="700">6351 Public Telephone Equip. Exp.</text>
  <text x="65" y="585" fill="#333" font-size="10">Coin phones &amp; mounting hardware</text>

  <rect x="320" y="549" width="260" height="45" rx="5" fill="white" filter="url(#sl)"/>
  <text x="330" y="567" fill="#e65100" font-size="11" font-weight="700">6362 Other Terminal Equip. Exp.</text>
  <text x="330" y="585" fill="#333" font-size="10">All other CPE not elsewhere classified</text>

  <text x="70" y="640" fill="#7a5400" font-size="9" font-style="italic">Customer premises equipment maintenance &amp; operations</text>

  <!-- Cable & Wire 6410 -->
  <rect x="605" y="450" width="555" height="210" rx="10" fill="url(#bg1)" filter="url(#s)"/>
  <rect x="620" y="460" width="525" height="30" rx="6" fill="#d68400"/>
  <text x="635" y="480" fill="white" font-size="13" font-weight="700">6410 Cable &amp; Wire Facilities Expenses</text>

  <rect x="620" y="498" width="170" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="630" y="516" fill="#e65100" font-size="10" font-weight="700">6411 Poles</text>
  <text x="630" y="530" fill="#333" font-size="9">Pole maint. &amp; ops</text>

  <rect x="798" y="498" width="170" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="808" y="516" fill="#e65100" font-size="10" font-weight="700">6421 Aerial Cable</text>
  <text x="808" y="530" fill="#333" font-size="9">Aerial cable ops</text>

  <rect x="976" y="498" width="170" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="986" y="516" fill="#e65100" font-size="10" font-weight="700">6422 Underground Cable</text>
  <text x="986" y="530" fill="#333" font-size="9">Underground cable ops</text>

  <rect x="620" y="544" width="170" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="630" y="562" fill="#e65100" font-size="10" font-weight="700">6423 Buried Cable</text>
  <text x="630" y="576" fill="#333" font-size="9">Buried cable ops</text>

  <rect x="798" y="544" width="170" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="808" y="562" fill="#e65100" font-size="10" font-weight="700">6424 Submarine Cable</text>
  <text x="808" y="576" fill="#333" font-size="9">Submarine/deep sea</text>

  <rect x="976" y="544" width="170" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="986" y="562" fill="#e65100" font-size="10" font-weight="700">6426 Intrabuilding</text>
  <text x="986" y="576" fill="#333" font-size="9">Intrabuilding network</text>

  <rect x="620" y="590" width="170" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="630" y="608" fill="#e65100" font-size="10" font-weight="700">6431 Aerial Wire</text>
  <text x="630" y="622" fill="#333" font-size="9">Bare line wire ops</text>

  <rect x="798" y="590" width="170" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="808" y="608" fill="#e65100" font-size="10" font-weight="700">6441 Conduit Systems</text>
  <text x="808" y="622" fill="#333" font-size="9">Conduit maint. &amp; ops</text>

  <text x="635" y="648" fill="#7a5400" font-size="9" font-style="italic">Outside plant maintenance, repair, rearrangement — mirrors plant account structure</text>

  <!-- ======= PLANT NONSPECIFIC ======= -->
  <rect x="40" y="690" width="1120" height="40" rx="10" fill="#bf6600"/>
  <rect x="40" y="718" width="1120" height="12" fill="#bf6600"/>
  <text x="60" y="720" fill="white" font-size="17" font-weight="700">PLANT NONSPECIFIC OPERATIONS EXPENSE</text>
  <text x="980" y="720" fill="#ffe0b2" font-size="12" font-style="italic">Accts 6510–6565</text>

  <!-- Other Property 6510 -->
  <rect x="40" y="745" width="365" height="150" rx="10" fill="url(#bg2)" filter="url(#s)"/>
  <rect x="55" y="755" width="335" height="30" rx="6" fill="#d68400"/>
  <text x="70" y="775" fill="white" font-size="13" font-weight="700">6510 Other Property/Plant/Equip.</text>

  <rect x="55" y="792" width="335" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="65" y="810" fill="#bf6600" font-size="11" font-weight="700">6511 Future Use Property Expense</text>
  <text x="65" y="824" fill="#333" font-size="10">Expenses for property held for future telecom use</text>

  <rect x="55" y="838" width="335" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="65" y="856" fill="#bf6600" font-size="11" font-weight="700">6512 Provisioning Expense</text>
  <text x="65" y="870" fill="#333" font-size="10">Inventory adjustments, material handling, warehousing</text>

  <!-- Network Operations 6530 -->
  <rect x="415" y="745" width="370" height="295" rx="10" fill="url(#bg2)" filter="url(#s)"/>
  <rect x="430" y="755" width="340" height="30" rx="6" fill="#d68400"/>
  <text x="445" y="775" fill="white" font-size="13" font-weight="700">6530 Network Operations Expenses</text>

  <rect x="430" y="792" width="340" height="45" rx="5" fill="white" filter="url(#sl)"/>
  <text x="440" y="810" fill="#bf6600" font-size="11" font-weight="700">6531 Power Expense</text>
  <text x="440" y="828" fill="#333" font-size="10">Electricity for telecom network operations</text>
  <text x="440" y="838" fill="#666" font-size="9" font-style="italic">Building electric → 6121; computer electric → 6124</text>

  <rect x="430" y="843" width="340" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="440" y="861" fill="#bf6600" font-size="11" font-weight="700">6532 Network Administration Expense</text>
  <text x="440" y="875" fill="#333" font-size="10">Planning, monitoring, controlling network operations</text>

  <rect x="430" y="889" width="340" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="440" y="907" fill="#bf6600" font-size="11" font-weight="700">6533 Testing Expense</text>
  <text x="440" y="921" fill="#333" font-size="10">Test board personnel &amp; circuit testing activities</text>

  <rect x="430" y="935" width="340" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="440" y="953" fill="#bf6600" font-size="11" font-weight="700">6534 Plant Operations Administration Exp.</text>
  <text x="440" y="967" fill="#333" font-size="10">Admin support for plant operations activities</text>

  <rect x="430" y="981" width="340" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="440" y="999" fill="#bf6600" font-size="11" font-weight="700">6535 Engineering Expense</text>
  <text x="440" y="1013" fill="#333" font-size="10">Engineering support for network planning/design</text>

  <!-- Access & D&A -->
  <rect x="795" y="745" width="365" height="295" rx="10" fill="url(#bg2)" filter="url(#s)"/>
  <rect x="810" y="755" width="335" height="30" rx="6" fill="#d68400"/>
  <text x="825" y="775" fill="white" font-size="13" font-weight="700">6540 Access · 6560 Depr. &amp; Amort.</text>

  <rect x="810" y="792" width="335" height="55" rx="5" fill="white" filter="url(#sl)"/>
  <text x="820" y="810" fill="#bf6600" font-size="12" font-weight="700">6540 Access Expense</text>
  <text x="820" y="828" fill="#333" font-size="10">Charges from other carriers for exchange access</text>
  <text x="820" y="842" fill="#666" font-size="9" font-style="italic">Does not include supervision/office support costs</text>

  <rect x="810" y="855" width="335" height="30" rx="5" fill="#fff3e0"/>
  <text x="820" y="875" fill="#bf6600" font-size="12" font-weight="700">6560 Depreciation &amp; Amortization</text>

  <rect x="810" y="891" width="335" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="820" y="906" fill="#bf6600" font-size="10" font-weight="700">6561 Depr.—Plant in Service</text>
  <text x="820" y="922" fill="#333" font-size="9">Depreciation of Accts 2112–2441</text>

  <rect x="810" y="935" width="160" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="820" y="950" fill="#bf6600" font-size="10" font-weight="700">6562 Depr.—Future Use</text>
  <text x="820" y="966" fill="#333" font-size="9">Depr. of Acct 2002</text>

  <rect x="980" y="935" width="165" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="990" y="950" fill="#bf6600" font-size="10" font-weight="700">6563 Amort.—Tangible</text>
  <text x="990" y="966" fill="#333" font-size="9">Accts 2681/2682</text>

  <rect x="810" y="981" width="160" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="820" y="996" fill="#bf6600" font-size="10" font-weight="700">6564 Amort.—Intangible</text>
  <text x="820" y="1012" fill="#333" font-size="9">Acct 2690 costs</text>

  <rect x="980" y="981" width="165" height="40" rx="5" fill="white" filter="url(#sl)"/>
  <text x="990" y="996" fill="#bf6600" font-size="10" font-weight="700">6565 Amort.—Other</text>
  <text x="990" y="1012" fill="#333" font-size="9">Acct 2005 (plant adj.)</text>

  <!-- Key rules box -->
  <rect x="40" y="1060" width="1120" height="110" rx="8" fill="white" filter="url(#s)"/>
  <text x="60" y="1085" fill="#e37400" font-size="13" font-weight="700">EXPENSE ACCOUNT PRINCIPLES</text>
  <text x="60" y="1105" fill="#333" font-size="11">• Plant Specific accounts mirror the plant asset accounts — each type of plant has a corresponding expense account</text>
  <text x="60" y="1123" fill="#333" font-size="11">• Include direct supervision (1st-level) and office support costs; NOT operator costs (→ activity accounts)</text>
  <text x="60" y="1141" fill="#333" font-size="11">• Reimbursements (joint ops, damage repairs, highway relocations) credited back to accounts originally charged</text>
  <text x="60" y="1159" fill="#333" font-size="11">• Plant Nonspecific includes supervision/office support EXCEPT for Access (6540) and D&amp;A (6560–6565)</text>

  <text x="600" y="1335" text-anchor="middle" fill="#999" font-size="10">47 CFR Part 32 — Uniform System of Accounts for Telecommunications Companies</text>
</svg>