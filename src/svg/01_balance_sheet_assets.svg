<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a2744"/><stop offset="100%" stop-color="#2c4a7c"/></linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e8f0fe"/><stop offset="100%" stop-color="#d4e4fc"/></linearGradient>
    <filter id="s"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <filter id="sl"><feDropShadow dx="0.5" dy="1" stdDeviation="1.5" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1200" height="900" fill="#f5f7fa" rx="12"/>
  <rect x="40" y="30" width="1120" height="80" rx="10" fill="url(#hg)" filter="url(#s)"/>
  <text x="600" y="65" text-anchor="middle" fill="white" font-size="22" font-weight="700">Balance Sheet — Current &amp; Noncurrent Assets</text>
  <text x="600" y="90" text-anchor="middle" fill="#a8c4e8" font-size="13">47 CFR Part 32 · Subpart C · Accounts 1120–1500</text>

  <!-- CURRENT ASSETS -->
  <rect x="40" y="140" width="545" height="720" rx="10" fill="url(#bg)" filter="url(#s)"/>
  <rect x="40" y="140" width="545" height="40" rx="10" fill="#4285f4"/>
  <rect x="40" y="168" width="545" height="12" fill="#4285f4"/>
  <text x="60" y="168" fill="white" font-size="17" font-weight="700">CURRENT ASSETS</text>

  <!-- 1120 -->
  <rect x="60" y="200" width="505" height="130" rx="8" fill="white" filter="url(#sl)"/>
  <rect x="60" y="200" width="80" height="28" rx="6" fill="#1a56db"/>
  <text x="72" y="220" fill="white" font-size="12" font-weight="700">1120</text>
  <text x="150" y="220" fill="#1a3a6e" font-size="14" font-weight="700">Cash and Equivalents</text>
  <text x="75" y="248" fill="#333" font-size="11">• Current funds on demand — in banks, in transit, or held by agents</text>
  <text x="75" y="266" fill="#333" font-size="11">• Special deposits (≤1 yr) for dividends, interest, contract performance</text>
  <text x="75" y="284" fill="#333" font-size="11">• Petty cash and working fund advances</text>
  <text x="75" y="302" fill="#333" font-size="11">• Temporary investments: T-bills, bankers' acceptances, marketable securities</text>
  <text x="75" y="320" fill="#666" font-size="10" font-style="italic">Subsidiaries: affiliate vs. nonaffiliate (per Part 43)</text>

  <!-- 1170 -->
  <rect x="60" y="342" width="505" height="130" rx="8" fill="white" filter="url(#sl)"/>
  <rect x="60" y="342" width="80" height="28" rx="6" fill="#1a56db"/>
  <text x="72" y="362" fill="white" font-size="12" font-weight="700">1170</text>
  <text x="150" y="362" fill="#1a3a6e" font-size="14" font-weight="700">Receivables</text>
  <text x="75" y="390" fill="#333" font-size="11">• Amounts due from customers for services rendered or billed</text>
  <text x="75" y="408" fill="#333" font-size="11">• Amounts from agents/collectors; products sold</text>
  <text x="75" y="426" fill="#333" font-size="11">• Notes, drafts receivable ≤1 yr; accrued interest &amp; dividends</text>
  <text x="75" y="444" fill="#333" font-size="11">• Traffic settlements, revenue divisions, matured rents</text>
  <text x="75" y="462" fill="#666" font-size="10" font-style="italic">Separate: customers in service vs. in collection; affiliate vs. nonaffiliate</text>

  <!-- 1171 + 1191 -->
  <rect x="60" y="484" width="245" height="80" rx="8" fill="white" filter="url(#sl)"/>
  <rect x="60" y="484" width="80" height="28" rx="6" fill="#5c9cf5"/>
  <text x="72" y="504" fill="white" font-size="12" font-weight="700">1171</text>
  <text x="150" y="504" fill="#1a3a6e" font-size="13" font-weight="600">Allow. Doubtful Accts</text>
  <text x="75" y="530" fill="#333" font-size="10">Contra to 1170; charged from</text>
  <text x="75" y="544" fill="#333" font-size="10">5300 (Uncollectible Revenue)</text>

  <rect x="320" y="484" width="245" height="80" rx="8" fill="white" filter="url(#sl)"/>
  <rect x="320" y="484" width="80" height="28" rx="6" fill="#5c9cf5"/>
  <text x="332" y="504" fill="white" font-size="12" font-weight="700">1191</text>
  <text x="410" y="504" fill="#1a3a6e" font-size="13" font-weight="600">AR Allow.—Other</text>
  <text x="335" y="530" fill="#333" font-size="10">Contra for other receivables;</text>
  <text x="335" y="544" fill="#333" font-size="10">charged from 5302</text>

  <!-- 1220 -->
  <rect x="60" y="576" width="505" height="100" rx="8" fill="white" filter="url(#sl)"/>
  <rect x="60" y="576" width="80" height="28" rx="6" fill="#1a56db"/>
  <text x="72" y="596" fill="white" font-size="12" font-weight="700">1220</text>
  <text x="150" y="596" fill="#1a3a6e" font-size="14" font-weight="700">Inventories</text>
  <text x="75" y="622" fill="#333" font-size="11">1220.1  Material &amp; Supplies — stock, plant supplies, tools, fuel, MFG articles</text>
  <text x="75" y="640" fill="#333" font-size="11">1220.2  Property Held for Sale or Lease — items purchased for resale/lease</text>
  <text x="75" y="660" fill="#666" font-size="10" font-style="italic">Include transport, sales tax; deduct cash discounts; periodic physical counts</text>

  <!-- 1280 + 1350 -->
  <rect x="60" y="688" width="245" height="100" rx="8" fill="white" filter="url(#sl)"/>
  <rect x="60" y="688" width="80" height="28" rx="6" fill="#1a56db"/>
  <text x="72" y="708" fill="white" font-size="12" font-weight="700">1280</text>
  <text x="150" y="708" fill="#1a3a6e" font-size="13" font-weight="600">Prepayments</text>
  <text x="75" y="734" fill="#333" font-size="10">Advance rents, taxes, insurance</text>
  <text x="75" y="748" fill="#333" font-size="10">premiums; directory prep costs.</text>
  <text x="75" y="762" fill="#333" font-size="10">Credited monthly as term expires.</text>
  <text x="75" y="778" fill="#666" font-size="9" font-style="italic">Excl. items chargeable to plant under construction</text>

  <rect x="320" y="688" width="245" height="100" rx="8" fill="white" filter="url(#sl)"/>
  <rect x="320" y="688" width="80" height="28" rx="6" fill="#1a56db"/>
  <text x="332" y="708" fill="white" font-size="12" font-weight="700">1350</text>
  <text x="410" y="708" fill="#1a3a6e" font-size="13" font-weight="600">Other Current Assets</text>
  <text x="335" y="734" fill="#333" font-size="10">All current assets not includable</text>
  <text x="335" y="748" fill="#333" font-size="10">in Accounts 1120–1280.</text>
  <text x="335" y="762" fill="#333" font-size="10">Catch-all for miscellaneous items.</text>

  <!-- NONCURRENT ASSETS -->
  <rect x="615" y="140" width="545" height="720" rx="10" fill="url(#bg)" filter="url(#s)"/>
  <rect x="615" y="140" width="545" height="40" rx="10" fill="#0d47a1"/>
  <rect x="615" y="168" width="545" height="12" fill="#0d47a1"/>
  <text x="635" y="168" fill="white" font-size="17" font-weight="700">NONCURRENT ASSETS</text>

  <!-- 1406 -->
  <rect x="635" y="200" width="505" height="90" rx="8" fill="white" filter="url(#sl)"/>
  <rect x="635" y="200" width="80" height="28" rx="6" fill="#1565c0"/>
  <text x="647" y="220" fill="white" font-size="12" font-weight="700">1406</text>
  <text x="725" y="220" fill="#1a3a6e" font-size="14" font-weight="700">Nonregulated Investments</text>
  <text x="650" y="248" fill="#333" font-size="11">Investment in nonregulated activities kept in a separate set of books</text>
  <text x="650" y="266" fill="#333" font-size="11">per §32.23(b) — activities not using joint/common regulated assets</text>
  <text x="650" y="282" fill="#666" font-size="10" font-style="italic">See also §32.14 Regulated accounts and §32.23 Nonregulated activities</text>

  <!-- 1410 -->
  <rect x="635" y="305" width="505" height="280" rx="8" fill="white" filter="url(#sl)"/>
  <rect x="635" y="305" width="80" height="28" rx="6" fill="#1565c0"/>
  <text x="647" y="325" fill="white" font-size="12" font-weight="700">1410</text>
  <text x="725" y="325" fill="#1a3a6e" font-size="14" font-weight="700">Other Noncurrent Assets</text>
  <text x="650" y="353" fill="#333" font-size="11">• Equity/cost-method investments in affiliated companies</text>
  <text x="650" y="371" fill="#333" font-size="11">• Investments in nonaffiliated securities &amp; investment advances</text>
  <text x="650" y="389" fill="#333" font-size="11">• Special cash deposits &gt;1 year from deposit date</text>
  <text x="650" y="407" fill="#333" font-size="11">• Sinking fund assets for debt redemption</text>
  <text x="650" y="425" fill="#333" font-size="11">• Unamortized debt issuance costs (amort. to 7500 monthly)</text>
  <text x="650" y="443" fill="#333" font-size="11">• Advances not subject to current settlement</text>
  <text x="650" y="461" fill="#333" font-size="11">• Lessee operating lease assets &gt;1 year (present value of min. payments)</text>
  <text x="650" y="479" fill="#333" font-size="11">• Lessor receivables from operating leases &gt;1 year</text>
  <text x="650" y="505" fill="#666" font-size="10" font-style="italic">Subsidiaries: equity method vs. cost method; pledged collateral identified</text>
  <text x="650" y="520" fill="#666" font-size="10" font-style="italic">Declines in value: temporary → 4540 Other Capital; permanent → current loss</text>
  <line x1="650" y1="533" x2="1125" y2="533" stroke="#ddd" stroke-width="1"/>
  <text x="650" y="550" fill="#8b4513" font-size="10" font-weight="600">⚠ Cap. operating leases excluded from ratemaking calculations</text>
  <text x="650" y="570" fill="#8b4513" font-size="10" font-weight="600">⚠ Current-settlement items belong in 1170, not here</text>

  <!-- 1438 -->
  <rect x="635" y="600" width="505" height="120" rx="8" fill="white" filter="url(#sl)"/>
  <rect x="635" y="600" width="80" height="28" rx="6" fill="#1565c0"/>
  <text x="647" y="620" fill="white" font-size="12" font-weight="700">1438</text>
  <text x="725" y="620" fill="#1a3a6e" font-size="14" font-weight="700">Deferred Maintenance &amp; Retirements</text>
  <text x="650" y="648" fill="#333" font-size="11">• Clearing account for plant acquisitions — holds purchase price until</text>
  <text x="660" y="664" fill="#333" font-size="11">allocated to specific plant accounts, depreciation reserves, &amp; goodwill</text>
  <text x="650" y="682" fill="#333" font-size="11">• Costs of extensive replacements chargeable over future periods</text>
  <text x="650" y="700" fill="#666" font-size="10" font-style="italic">Charges to this acct require Commission direction or approval</text>

  <!-- 1500 -->
  <rect x="635" y="735" width="505" height="90" rx="8" fill="white" filter="url(#sl)"/>
  <rect x="635" y="735" width="80" height="28" rx="6" fill="#1565c0"/>
  <text x="647" y="755" fill="white" font-size="12" font-weight="700">1500</text>
  <text x="725" y="755" fill="#1a3a6e" font-size="14" font-weight="700">Other Jurisdictional Assets—Net</text>
  <text x="650" y="783" fill="#333" font-size="11">Cumulative impact on assets of jurisdictional ratemaking practices</text>
  <text x="650" y="801" fill="#333" font-size="11">that differ from FCC accounting — recorded net of applicable income taxes</text>

  <text x="600" y="880" text-anchor="middle" fill="#999" font-size="10">47 CFR Part 32 — Uniform System of Accounts for Telecommunications Companies</text>
</svg>