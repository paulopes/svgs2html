<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a2744"/><stop offset="100%" stop-color="#2c4a7c"/></linearGradient>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e3f2fd"/><stop offset="100%" stop-color="#bbdefb"/></linearGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fce4ec"/><stop offset="100%" stop-color="#f8bbd0"/></linearGradient>
    <filter id="s"><feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <filter id="sl"><feDropShadow dx="0.5" dy="1" stdDeviation="1.5" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1200" height="700" fill="#f5f7fa" rx="12"/>
  <rect x="40" y="30" width="1120" height="80" rx="10" fill="url(#hg)" filter="url(#s)"/>
  <text x="600" y="65" text-anchor="middle" fill="white" font-size="22" font-weight="700">Expense Accounts — Customer &amp; Corporate Operations</text>
  <text x="600" y="90" text-anchor="middle" fill="#a8c4e8" font-size="13">47 CFR Part 32 · Subpart E · Customer Operations (6600s) &amp; Corporate Operations (6700s)</text>

  <!-- CUSTOMER OPERATIONS -->
  <rect x="40" y="135" width="730" height="430" rx="10" fill="url(#bg1)" filter="url(#s)"/>
  <rect x="40" y="135" width="730" height="40" rx="10" fill="#1565c0"/>
  <rect x="40" y="163" width="730" height="12" fill="#1565c0"/>
  <text x="60" y="163" fill="white" font-size="17" font-weight="700">CUSTOMER OPERATIONS EXPENSE</text>
  <text x="600" y="163" fill="#90caf9" font-size="12" font-style="italic">Accts 6610–6623</text>

  <!-- Marketing 6610 -->
  <rect x="55" y="190" width="340" height="30" rx="6" fill="#1976d2"/>
  <text x="70" y="210" fill="white" font-size="14" font-weight="700">6610 Marketing</text>

  <rect x="55" y="228" width="340" height="90" rx="7" fill="white" filter="url(#sl)"/>
  <rect x="55" y="228" width="70" height="26" rx="5" fill="#42a5f5"/>
  <text x="65" y="246" fill="white" font-size="11" font-weight="700">6611</text>
  <text x="135" y="246" fill="#0d47a1" font-size="13" font-weight="700">Product Mgmt. &amp; Sales</text>
  <text x="70" y="270" fill="#333" font-size="10">Product management, market research, sales force activities</text>
  <text x="70" y="284" fill="#333" font-size="10">Includes development of pricing, packaging, and promotional strategies</text>
  <text x="70" y="298" fill="#333" font-size="10">Sales representative compensation and commission costs</text>
  <text x="70" y="312" fill="#666" font-size="9" font-style="italic">Includes supervision, office support, and training for these activities</text>

  <rect x="55" y="326" width="340" height="70" rx="7" fill="white" filter="url(#sl)"/>
  <rect x="55" y="326" width="70" height="26" rx="5" fill="#42a5f5"/>
  <text x="65" y="344" fill="white" font-size="11" font-weight="700">6613</text>
  <text x="135" y="344" fill="#0d47a1" font-size="13" font-weight="700">Product Advertising</text>
  <text x="70" y="366" fill="#333" font-size="10">Advertising costs for products and services</text>
  <text x="70" y="380" fill="#333" font-size="10">Media costs, production, agency fees</text>
  <text x="70" y="392" fill="#666" font-size="9" font-style="italic">Both tariffed and nontariffed service advertising</text>

  <!-- Services 6620 -->
  <rect x="410" y="190" width="345" height="30" rx="6" fill="#1976d2"/>
  <text x="425" y="210" fill="white" font-size="14" font-weight="700">6620 Services</text>

  <rect x="410" y="228" width="345" height="70" rx="7" fill="white" filter="url(#sl)"/>
  <rect x="410" y="228" width="70" height="26" rx="5" fill="#42a5f5"/>
  <text x="420" y="246" fill="white" font-size="11" font-weight="700">6621</text>
  <text x="490" y="246" fill="#0d47a1" font-size="13" font-weight="700">Call Completion Services</text>
  <text x="425" y="270" fill="#333" font-size="10">Operator services personnel for completing calls</text>
  <text x="425" y="284" fill="#333" font-size="10">Person-to-person, collect, credit card, third-party billing</text>
  <text x="425" y="294" fill="#666" font-size="9" font-style="italic">Operator service specifically for call completion</text>

  <rect x="410" y="306" width="345" height="70" rx="7" fill="white" filter="url(#sl)"/>
  <rect x="410" y="306" width="70" height="26" rx="5" fill="#42a5f5"/>
  <text x="420" y="324" fill="white" font-size="11" font-weight="700">6622</text>
  <text x="490" y="324" fill="#0d47a1" font-size="13" font-weight="700">Number Services</text>
  <text x="425" y="348" fill="#333" font-size="10">Directory assistance, intercept, number change services</text>
  <text x="425" y="362" fill="#333" font-size="10">Publishing &amp; distributing telephone directories</text>
  <text x="425" y="372" fill="#666" font-size="9" font-style="italic">Directory prep costs initially in 1280 (Prepayments)</text>

  <rect x="410" y="384" width="345" height="80" rx="7" fill="white" filter="url(#sl)"/>
  <rect x="410" y="384" width="70" height="26" rx="5" fill="#42a5f5"/>
  <text x="420" y="402" fill="white" font-size="11" font-weight="700">6623</text>
  <text x="490" y="402" fill="#0d47a1" font-size="13" font-weight="700">Customer Services</text>
  <text x="425" y="424" fill="#333" font-size="10">Establishing, servicing &amp; terminating customer accounts</text>
  <text x="425" y="438" fill="#333" font-size="10">Billing inquiry resolution; credit &amp; collection activities</text>
  <text x="425" y="452" fill="#333" font-size="10">Collection shortages from coin-box stations</text>
  <text x="425" y="462" fill="#666" font-size="9" font-style="italic">Collection overages → 5200 (Miscellaneous Revenue)</text>

  <text x="55" y="538" fill="#0d47a1" font-size="10" font-weight="600">All Customer Operations accounts include costs of supervision, office support, and training</text>
  <text x="55" y="555" fill="#555" font-size="10" font-style="italic">Customer ops = marketing/sales activities + customer-facing service activities performed by the company</text>

  <!-- CORPORATE OPERATIONS -->
  <rect x="790" y="135" width="370" height="430" rx="10" fill="url(#bg2)" filter="url(#s)"/>
  <rect x="790" y="135" width="370" height="40" rx="10" fill="#880e4f"/>
  <rect x="790" y="163" width="370" height="12" fill="#880e4f"/>
  <text x="810" y="163" fill="white" font-size="17" font-weight="700">CORPORATE OPS EXPENSE</text>

  <rect x="805" y="190" width="340" height="200" rx="7" fill="white" filter="url(#sl)"/>
  <rect x="805" y="190" width="70" height="26" rx="5" fill="#c2185b"/>
  <text x="815" y="208" fill="white" font-size="11" font-weight="700">6720</text>
  <text x="885" y="208" fill="#880e4f" font-size="14" font-weight="700">General &amp; Administrative</text>

  <text x="820" y="234" fill="#880e4f" font-size="11" font-weight="600">Executive &amp; Planning:</text>
  <text x="830" y="250" fill="#333" font-size="10">• Corporate officers &amp; executive management</text>
  <text x="830" y="264" fill="#333" font-size="10">• Corporate planning &amp; strategy</text>
  <text x="830" y="278" fill="#333" font-size="10">• Long-range forecasting &amp; analysis</text>

  <text x="820" y="298" fill="#880e4f" font-size="11" font-weight="600">General &amp; Administrative:</text>
  <text x="830" y="314" fill="#333" font-size="10">• Accounting, auditing &amp; financial</text>
  <text x="830" y="328" fill="#333" font-size="10">• Legal &amp; regulatory affairs</text>
  <text x="830" y="342" fill="#333" font-size="10">• Human resources &amp; labor relations</text>
  <text x="830" y="356" fill="#333" font-size="10">• Public relations &amp; external affairs</text>
  <text x="830" y="370" fill="#333" font-size="10">• App system planning &amp; DB maint.</text>
  <text x="830" y="384" fill="#666" font-size="9" font-style="italic">Also: known revenue collection losses (fire/theft)</text>

  <rect x="805" y="400" width="340" height="75" rx="7" fill="white" filter="url(#sl)"/>
  <rect x="805" y="400" width="70" height="26" rx="5" fill="#c2185b"/>
  <text x="815" y="418" fill="white" font-size="11" font-weight="700">6790</text>
  <text x="885" y="418" fill="#880e4f" font-size="14" font-weight="700">Prov. Uncollectible Notes Rec.</text>
  <text x="820" y="442" fill="#333" font-size="10">Provision for uncollectible notes receivable</text>
  <text x="820" y="458" fill="#333" font-size="10">Charged here; credited to Account 1170 Receivables</text>
  <text x="820" y="472" fill="#666" font-size="9" font-style="italic">Distinguished from 5300 (uncollectible revenue)</text>

  <text x="810" y="510" fill="#880e4f" font-size="10" font-weight="600">Includes supervision, office support &amp; training</text>
  <text x="810" y="527" fill="#555" font-size="10" font-style="italic">Executive, planning, and G&amp;A functions</text>
  <text x="810" y="544" fill="#555" font-size="10" font-style="italic">that benefit the company as a whole</text>

  <!-- Summary bar -->
  <rect x="40" y="590" width="1120" height="70" rx="8" fill="white" filter="url(#s)"/>
  <text x="60" y="615" fill="#333" font-size="13" font-weight="700">EXPENSE ACCOUNT HIERARCHY SUMMARY (Subpart E)</text>
  <rect x="60" y="628" width="180" height="22" rx="4" fill="#e37400"/>
  <text x="72" y="644" fill="white" font-size="10" font-weight="600">Plant Specific (6110–6410)</text>
  <rect x="250" y="628" width="180" height="22" rx="4" fill="#bf6600"/>
  <text x="262" y="644" fill="white" font-size="10" font-weight="600">Plant Nonspecific (6510–6565)</text>
  <rect x="440" y="628" width="180" height="22" rx="4" fill="#1565c0"/>
  <text x="452" y="644" fill="white" font-size="10" font-weight="600">Customer Ops (6610–6623)</text>
  <rect x="630" y="628" width="180" height="22" rx="4" fill="#880e4f"/>
  <text x="642" y="644" fill="white" font-size="10" font-weight="600">Corporate Ops (6720–6790)</text>
  <text x="830" y="645" fill="#555" font-size="11">← Five functional groups total</text>

  <text x="600" y="688" text-anchor="middle" fill="#999" font-size="10">47 CFR Part 32 — Uniform System of Accounts for Telecommunications Companies</text>
</svg>